<!DOCTYPE html>
<html>
<head>
    <title>My 3D Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MyMap">
    
    <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" rel="stylesheet" />
    256
    <style>
        body { margin: 0; padding: 0; background-color: #f4f4f4; font-family: -apple-system, sans-serif; }
        #map { 
            position: absolute; 
            top: 0; 
            bottom: 0; 
            width: 100%; 
            /* This creates the space-like void behind the globe */
            background-color: #D3D3FF; 
        }
        
        .map-controls {
            position: absolute; bottom: 30px; right: 12px;
            z-index: 10; display: flex; flex-direction: column; gap: 10px;
        }

        .control-btn {
            background-color: rgba(255, 255, 255, 0.95); border: 1px solid #ccc;
            width: 50px; height: 50px; border-radius: 50%; font-size: 22px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent; padding: 0;
        }

        .control-btn:active { background-color: #e0e0e0; }

        /* Hide the default MapLibre geolocation button */
        .maplibregl-ctrl-geolocate { display: none !important; }
        .maplibregl-ctrl-top-right .maplibregl-ctrl-group:has(.maplibregl-ctrl-geolocate) { display: none !important; }
        .maplibregl-user-location-dot::before {display: none !important;}
    </style>
</head>
<body>

<div class="map-controls">
    <button id="compass-btn" class="control-btn" onclick="snapToNorth()">🧭</button>
    <button id="dimension-btn" class="control-btn" onclick="toggle2D3D()">🗺️</button>
    <button class="control-btn" onclick="locate()">🌐</button>
</div>

<div id="map"></div>

<script>
    // 1. Declare state variables FIRST
    let is3DMode = true;

    // 2. Initialize Map with hardcoded URLs
    const map = new maplibregl.Map({
        container: 'map', 
        zoom: 12.5,
        center: [-110.760, 43.771],
        pitch: 65, 
        bearing: -45, 
        maxPitch: 85,
        style: {
            version: 8,
            projection: { type: 'globe' }, 
            sky: {
                "sky-color": "#519CE0",      
                "horizon-color": "#ffffff",  
                "horizon-fog-blend": 0.0,
                "fog-color": "rgba(255,255,255,0)",
                "fog-ground-blend": 0.5,     
                
                "atmosphere-blend": ["interpolate",
                    ["linear"],
                    ["zoom"],
                    1, 0.5, 
                    3, 0.0]
            },
            sources: {
                // Hardcoded the OSM and AWS Terrarium URLs here
                'osm-base': { type: 'raster', tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize: 256 },
                'terrain-source': { type: 'raster-dem', tiles: ['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'], encoding: 'terrarium', tileSize: 256 }
            },
            layers: [{ id: 'osm-layer', type: 'raster', source: 'osm-base' }],
            terrain: is3DMode ? { source: 'terrain-source', exaggeration: 1.2 } : null
        },
        attributionControl: false
    });

    // 3. Smart Battery-Saving Event Listeners
    const compassBtn = document.getElementById('compass-btn');
    map.on('rotate', () => {
        const bearing = map.getBearing();
        compassBtn.style.transform = `rotate(${-bearing}deg)`;
    });

    // 4. Button Functions
    function snapToNorth() { map.resetNorth(); }

    const dimensionBtn = document.getElementById('dimension-btn');
    function toggle2D3D() {
        is3DMode = !is3DMode;
        if (is3DMode) {
            map.easeTo({ pitch: 65, duration: 400 });
            dimensionBtn.innerText = "🗺️";
            map.setTerrain({ source: 'terrain-source', exaggeration: 1.2 });
        } else {
            map.easeTo({ pitch: 0, duration: 400 });
            dimensionBtn.innerText = "⛰️";
            map.setTerrain(null);
        }
    }

    // 5. Geolocation setup
    const geolocateControl = new maplibregl.GeolocateControl({
        positionOptions: { enableHighAccuracy: true },
        trackUserLocation: true,
        showUserHeading: true
    });
    map.addControl(geolocateControl);
    
    function locate() {
        geolocateControl.trigger();
    }
</script>

</body>
</html>
